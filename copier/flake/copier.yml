_min_copier_version: "9.0.0"

project_name:
  type: str
  help: "Project name"
  default: "my-flake"
  validator: >-
    {% if not (project_name | regex_search('^[a-zA-Z0-9][a-zA-Z0-9._-]*$')) %}
    project_name must use letters/digits/._- and start with a letter or digit
    {% endif %}

description:
  type: str
  help: "One-line description"
  default: "A Nix flake project"

author:
  type: str
  help: "Copyright holder name"
  default: ""

license:
  type: str
  default: "MIT"
  choices:
    - MIT
    - Apache-2.0

remote:
  type: bool
  help: "Include remote repository helper and CI workflow"
  default: true

github_visibility:
  type: str
  help: "Default visibility for `just repo-create`"
  default: "private"
  when: "{{ remote }}"
  choices:
    - private
    - public

_exclude:
  - copier.yaml
  - copier.yml
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"
  - "{% if not remote %}.github{% else %}.copier-never-exclude{% endif %}"
